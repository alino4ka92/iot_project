<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки - Мониторинг коров</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="logo">🐮 CowFarm IoT</div>
        <nav>
            <ul>
                <li><a href="index.html">Дашборд</a></li>
                <li><a href="notifications.html">Уведомления</a></li>
                <li><a href="settings.html" class="active">Настройки</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="overview">
            <h1>Настройки</h1>
            <p>Конфигурация параметров мониторинга.</p>
        </section>

        <section class="settings-panel">
            <div class="widget-card" style="max-width: 600px;">
                <h3>Пороги температуры (°C)</h3>
                <form id="settings-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Предупреждение (выше):</label>
                            <input type="number" step="0.1" id="temp_warning_high" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Критическая (выше):</label>
                            <input type="number" step="0.1" id="temp_critical_high" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Предупреждение (ниже):</label>
                            <input type="number" step="0.1" id="temp_warning_low" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Критическая (ниже):</label>
                            <input type="number" step="0.1" id="temp_critical_low" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                    </div>

                    <h3 style="margin-top: 2rem;">Пороги активности</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Предупреждение (ниже):</label>
                            <input type="number" id="activity_warning_low" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Критическая (ниже):</label>
                            <input type="number" id="activity_critical_low" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Предупреждение (выше):</label>
                            <input type="number" id="activity_warning_high" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Критическая (выше):</label>
                            <input type="number" id="activity_critical_high" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                    </div>

                    <h3 style="margin-top: 2rem;">Кулдаун алертов</h3>
                    <div style="margin-top: 1rem; margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Интервал между алертами (сек):</label>
                        <input type="number" id="cooldown_sec" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                    </div>

                    <div id="save-status" style="margin-bottom: 1rem; font-weight: bold;"></div>
                    <button type="submit" style="background-color: var(--primary-color); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; font-weight: bold; cursor: pointer;">Сохранить параметры</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CowFarm IoT</p>
    </footer>
    <script src="/static/app.js"></script>
</body>
</html>
