<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки - Мониторинг коров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🐮 CowFarm IoT</div>
        <nav>
            <ul>
                <li><a href="index.html">Дашборд</a></li>
                <li><a href="notifications.html">Уведомления</a></li>
                <li><a href="settings.html" class="active">Настройки</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="overview">
            <h1>Настройки</h1>
            <p>Конфигурация параметров мониторинга.</p>
        </section>

        <section class="settings-panel">
            <div class="widget-card" style="max-width: 500px;">
                <h3>Пороги тревог (Демонстрация)</h3>
                <form onsubmit="event.preventDefault(); alert('Настройки сохранены! (Это демонстрационный интерфейс)');">
                    <div style="margin-bottom: 1rem; margin-top: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Критическая температура (°C):</label>
                        <input type="number" step="0.1" value="39.5" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500;">Критическая активность (минимум):</label>
                        <input type="number" value="30" style="padding: 0.75rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px;">
                    </div>
                    <button type="submit" style="background-color: var(--primary-color); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; font-weight: bold; cursor: pointer;">Сохранить параметры</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CowFarm IoT</p>
    </footer>
</body>
</html>
