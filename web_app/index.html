<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Стада</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <header>
        <div class="logo">🐮 CowFarm IoT</div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Дашборд</a></li>
                <li><a href="notifications.html">Уведомления</a></li>
                <li><a href="settings.html">Настройки</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="overview">
            <h1>Обзор состояния стада</h1>
            <p>Панель мониторинга в реальном времени. Данные обновляются автоматически.</p>
        </section>

        <section class="map-section">
            <div class="widget-card map-card">
                <h3>Карта фермы (Местоположение стада)</h3>
                <div id="map"></div>
            </div>
        </section>

        <section class="grafana-widgets">
            <!-- Место под встраиваемые графики из Grafana -->
            <div class="widget-card">
                <h3>Температура коров (В реальном времени)</h3>
                <div class="iframe-container">
                    <iframe src="http://localhost:3000/d-solo/cow-dashboard/cow-dashboard?orgId=1&panelId=1&theme=light&refresh=5s" width="100%" height="300" frameborder="0"></iframe>
                </div>
            </div>

            <div class="widget-card">
                <h3>Уровень активности</h3>
                <div class="iframe-container">
                    <iframe src="http://localhost:3000/d-solo/cow-dashboard/cow-dashboard?orgId=1&panelId=2&theme=light&refresh=5s" width="100%" height="300" frameborder="0"></iframe>
                </div>
            </div>

            <div class="widget-card">
                <h3>Вероятность заболеваний</h3>
                <div class="iframe-container">
                    <iframe src="http://localhost:3000/d-solo/cow-dashboard/cow-dashboard?orgId=1&panelId=3&theme=light&refresh=5s" width="100%" height="300" frameborder="0"></iframe>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CowFarm IoT</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
